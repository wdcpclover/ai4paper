<?xml version="1.0"?>

<?xml-stylesheet href="chrome://global/skin/" type="text/css"?>
<?xml-stylesheet href="chrome://zotero/skin/zotero.css" type="text/css"?>
<?xml-stylesheet href="chrome://zotero-platform/content/zotero.css" type="text/css"?>
<?xml-stylesheet href="chrome://zotero/skin/scaffold.css" type="text/css"?>

<?xml-stylesheet href="chrome://ai4paper/content/assets/css/style.css" type="text/css"?>

<!DOCTYPE window SYSTEM "chrome://zotero/locale/zotero.dtd">
<window xmlns:html="http://www.w3.org/1999/xhtml"
    xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
    id="zotero-customItemTreeColumns-dialog"
    title="主界面列视图" 
    style="min-width: 450px;"
    persist="width height screenX screenY"
    windowtype="zoteroone-windowType-customItemTreeColumns"
    onload="methodsBody.init();">
<dialog 
    buttons="accept"
    buttonlabelaccept="关闭窗口" 
    id="ZoteroOneDialog-customItemTreeColumns">

    <script>
        Services.scriptloader.loadSubScript("chrome://zotero/content/include.js", this);
        Services.scriptloader.loadSubScript("chrome://ai4paper/content/selectionDialog/customItemTreeColumns.js", this);
        Services.scriptloader.loadSubScript("chrome://zotero/content/customElements.js", this);
    </script>

	<html:style>
		.buttonIcon {
            margin-right: 15px;
            transition: transform 0.125s ease;
		}
        .buttonIcon:hover {
            transform: scale(1.1);
        }
        .buttonIcon:not(:hover) {
            transform: scale(1);
        }
	</html:style>

    <linkset>
        <html:link rel="localization" href="customItemTreeColumns.ftl"/>
    </linkset>  

    <vbox id="vboxContainer-elem">

        <box flex="1">
            <richlistbox id="richlistbox-elem" flex="1" style='padding-left: 5px;margin-top: 8px;'>

                <!-- * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * 常规 * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * -->
                <groupbox>
                    <!-- <label><html:h2 data-l10n-id='ai4paper-customItemTreeColumns-title-label'></html:h2></label> -->

                    <!-- 短标题 -->

                   <html:div style='display: grid;align-items: center;grid-template-columns: 1fr max-content max-content;'>

                        <checkbox id="ai4paper.enableCustomItemTreeColumnsshortTitle" 
                                  preference="extensions.zotero.ai4paper.enableCustomItemTreeColumnsshortTitle" 
                                  data-l10n-id="ai4paper-customItemTreeColumns-shortTitle" 
                                  native="true"
                                  oncommand="Zotero.Prefs.set('ai4paper.enableCustomItemTreeColumnsshortTitle', this.checked);Zotero.AI4Paper.customItemTreeColumns();"/> 

                        <html:input type="text" 
                                    id="ai4paper.renameCustomItemTreeColumnsshortTitle"
                                    preference="extensions.zotero.ai4paper.renameCustomItemTreeColumnsshortTitle"  
                                    style='margin-right: 100px;' 
                                    size="15"
                                    oninput='Zotero.Prefs.set("ai4paper.renameCustomItemTreeColumnsshortTitle", this.value);'></html:input>

                        <div class="buttonIcon svg-container-reset"
                            tooltiptext="恢复默认" 
                            onclick='document.getElementById("ai4paper.renameCustomItemTreeColumnsshortTitle").value = "中文标题";Zotero.Prefs.set("ai4paper.renameCustomItemTreeColumnsshortTitle", "中文标题");'>
                        </div>
                    </html:div>

                    <!-- 档案 -->

                   <html:div style='display: grid;align-items: center;grid-template-columns: 1fr max-content max-content;'>

                        <checkbox id="ai4paper.enableCustomItemTreeColumnsarchive" 
                                  preference="extensions.zotero.ai4paper.enableCustomItemTreeColumnsarchive" 
                                  data-l10n-id="ai4paper-customItemTreeColumns-archive" 
                                  native="true"
                                  oncommand="Zotero.Prefs.set('ai4paper.enableCustomItemTreeColumnsarchive', this.checked);Zotero.AI4Paper.customItemTreeColumns();"/> 
                                  <!-- Zotero.AI4Paper_Prefs.onChangeValue.customItemTreeColumns(this.checked, 'archive'); -->

                        <html:input type="text" 
                                    id="ai4paper.renameCustomItemTreeColumnsarchive"
                                    preference="extensions.zotero.ai4paper.renameCustomItemTreeColumnsarchive"  
                                    style='margin-right: 100px;' 
                                    size="15"
                                    oninput='Zotero.Prefs.set("ai4paper.renameCustomItemTreeColumnsarchive", this.value);'></html:input>

                        <div class="buttonIcon svg-container-reset"
                            tooltiptext="恢复默认" 
                            onclick='document.getElementById("ai4paper.renameCustomItemTreeColumnsarchive").value = "归档日期";Zotero.Prefs.set("ai4paper.renameCustomItemTreeColumnsarchive", "归档日期");'>
                        </div>
                    </html:div>

                    <!-- 存档位置 -->

                   <html:div style='display: grid;align-items: center;grid-template-columns: 1fr max-content max-content;'>

                        <checkbox id="ai4paper.enableCustomItemTreeColumnsarchiveLocation" 
                                  preference="extensions.zotero.ai4paper.enableCustomItemTreeColumnsarchiveLocation" 
                                  data-l10n-id="ai4paper-customItemTreeColumns-archiveLocation" 
                                  native="true"
                                  oncommand="Zotero.Prefs.set('ai4paper.enableCustomItemTreeColumnsarchiveLocation', this.checked);Zotero.AI4Paper.customItemTreeColumns();"/> 

                        <html:input type="text" 
                                    id="ai4paper.renameCustomItemTreeColumnsarchiveLocation"
                                    preference="extensions.zotero.ai4paper.renameCustomItemTreeColumnsarchiveLocation"  
                                    style='margin-right: 100px;' 
                                    size="15"
                                    oninput='Zotero.Prefs.set("ai4paper.renameCustomItemTreeColumnsarchiveLocation", this.value);'></html:input>

                        <div class="buttonIcon svg-container-reset"
                            tooltiptext="恢复默认" 
                            onclick='document.getElementById("ai4paper.renameCustomItemTreeColumnsarchiveLocation").value = "引用量";Zotero.Prefs.set("ai4paper.renameCustomItemTreeColumnsarchiveLocation", "引用量");'>
                        </div>
                    </html:div>

                    <!-- 文库编目 -->

                   <html:div style='display: grid;align-items: center;grid-template-columns: 1fr max-content max-content;'>

                        <checkbox id="ai4paper.enableCustomItemTreeColumnslibraryCatalog" 
                                  preference="extensions.zotero.ai4paper.enableCustomItemTreeColumnslibraryCatalog" 
                                  data-l10n-id="ai4paper-customItemTreeColumns-libraryCatalog" 
                                  native="true"
                                  oncommand="Zotero.Prefs.set('ai4paper.enableCustomItemTreeColumnslibraryCatalog', this.checked);Zotero.AI4Paper.customItemTreeColumns();"/> 

                        <html:input type="text" 
                                    id="ai4paper.renameCustomItemTreeColumnslibraryCatalog"
                                    preference="extensions.zotero.ai4paper.renameCustomItemTreeColumnslibraryCatalog"  
                                    style='margin-right: 100px;' 
                                    size="15"
                                    oninput='Zotero.Prefs.set("ai4paper.renameCustomItemTreeColumnslibraryCatalog", this.value);'></html:input>

                        <div class="buttonIcon svg-container-reset"
                            tooltiptext="恢复默认" 
                            onclick='document.getElementById("ai4paper.renameCustomItemTreeColumnslibraryCatalog").value = "影响因子";Zotero.Prefs.set("ai4paper.renameCustomItemTreeColumnslibraryCatalog", "影响因子");'>
                        </div>
                    </html:div>

                    <!-- 索书号 -->

                   <html:div style='display: grid;align-items: center;grid-template-columns: 1fr max-content max-content;'>

                        <checkbox id="ai4paper.enableCustomItemTreeColumnscallNumber" 
                                  preference="extensions.zotero.ai4paper.enableCustomItemTreeColumnscallNumber" 
                                  data-l10n-id="ai4paper-customItemTreeColumns-callNumber" 
                                  native="true"
                                  oncommand="Zotero.Prefs.set('ai4paper.enableCustomItemTreeColumnscallNumber', this.checked);Zotero.AI4Paper.customItemTreeColumns();"/> 

                        <html:input type="text" 
                                    id="ai4paper.renameCustomItemTreeColumnscallNumber"
                                    preference="extensions.zotero.ai4paper.renameCustomItemTreeColumnscallNumber"  
                                    style='margin-right: 100px;' 
                                    size="15"
                                    oninput='Zotero.Prefs.set("ai4paper.renameCustomItemTreeColumnscallNumber", this.value);'></html:input>

                        <div class="buttonIcon svg-container-reset"
                            tooltiptext="恢复默认" 
                            onclick='document.getElementById("ai4paper.renameCustomItemTreeColumnscallNumber").value = "中科院分区";Zotero.Prefs.set("ai4paper.renameCustomItemTreeColumnscallNumber", "中科院分区");'>
                        </div>
                    </html:div>

                    <!-- 分区汇总 -->

                   <html:div style='display: grid;align-items: center;grid-template-columns: 1fr max-content max-content;'>

                        <checkbox id="ai4paper.enableCustomItemTreeColumnsjournalRanking" 
                                  preference="extensions.zotero.ai4paper.enableCustomItemTreeColumnsjournalRanking" 
                                  data-l10n-id="ai4paper-customItemTreeColumns-journalRanking" 
                                  native="true"
                                  oncommand="Zotero.Prefs.set('ai4paper.enableCustomItemTreeColumnsjournalRanking', this.checked);Zotero.AI4Paper.customItemTreeColumns();"/> 

                        <html:input type="text" 
                                    id="ai4paper.renameCustomItemTreeColumnsjournalRanking"
                                    preference="extensions.zotero.ai4paper.renameCustomItemTreeColumnsjournalRanking"  
                                    style='margin-right: 100px;' 
                                    size="15"
                                    oninput='Zotero.Prefs.set("ai4paper.renameCustomItemTreeColumnsjournalRanking", this.value);'></html:input>

                        <div class="buttonIcon svg-container-reset"
                            tooltiptext="恢复默认" 
                            onclick='document.getElementById("ai4paper.renameCustomItemTreeColumnsjournalRanking").value = "分区汇总";Zotero.Prefs.set("ai4paper.renameCustomItemTreeColumnsjournalRanking", "分区汇总");'>
                        </div>
                    </html:div>

                    <!-- 版权 -->

                   <html:div style='display: grid;align-items: center;grid-template-columns: 1fr max-content max-content;'>

                        <checkbox id="ai4paper.enableCustomItemTreeColumnsrights" 
                                  preference="extensions.zotero.ai4paper.enableCustomItemTreeColumnsrights" 
                                  data-l10n-id="ai4paper-customItemTreeColumns-rights" 
                                  native="true"
                                  oncommand="Zotero.Prefs.set('ai4paper.enableCustomItemTreeColumnsrights', this.checked);Zotero.AI4Paper.customItemTreeColumns();"/> 

                        <html:input type="text" 
                                    id="ai4paper.renameCustomItemTreeColumnsrights"
                                    preference="extensions.zotero.ai4paper.renameCustomItemTreeColumnsrights"  
                                    style='margin-right: 100px;' 
                                    size="15"
                                    oninput='Zotero.Prefs.set("ai4paper.renameCustomItemTreeColumnsrights", this.value);'></html:input>

                        <div class="buttonIcon svg-container-reset"
                            tooltiptext="恢复默认" 
                            onclick='document.getElementById("ai4paper.renameCustomItemTreeColumnsrights").value = "星标";Zotero.Prefs.set("ai4paper.renameCustomItemTreeColumnsrights", "星标");'>
                        </div>
                    </html:div>
                </groupbox>
            </richlistbox>
        </box>
    </vbox>
</dialog>

<keyset>
	<key id="key_close" key="W" modifiers="accel" oncommand="window.close();"/>
</keyset>
</window>
