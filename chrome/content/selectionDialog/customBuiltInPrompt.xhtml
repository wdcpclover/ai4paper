<?xml version="1.0"?>

<?xml-stylesheet href="chrome://global/skin/" type="text/css"?>
<?xml-stylesheet href="chrome://zotero/skin/zotero.css" type="text/css"?>
<?xml-stylesheet href="chrome://zotero-platform/content/zotero.css" type="text/css"?>
<?xml-stylesheet href="chrome://zotero/skin/scaffold.css" type="text/css"?>

<?xml-stylesheet href="chrome://ai4paper/content/assets/css/style.css" type="text/css"?>

<!DOCTYPE window SYSTEM "chrome://zotero/locale/zotero.dtd">
<window xmlns:html="http://www.w3.org/1999/xhtml"
    xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
    title="自定义内置提示词"
    style="min-width: 500px;" 
    persist="width height screenX screenY"
    windowtype="zoteroone-windowType-customBuiltInPrompt"
    onload="methodsBody.init();">
<dialog 
	buttons="accept"
	buttonlabelaccept="关闭窗口" 
    id="ZoteroOneDialog-customBuiltInPrompt">

    <script>
        Services.scriptloader.loadSubScript("chrome://zotero/content/include.js", this);
        Services.scriptloader.loadSubScript("chrome://zotero/content/customElements.js", this);

        Services.scriptloader.loadSubScript("chrome://ai4paper/content/selectionDialog/customBuiltInPrompt.js", this);
    </script>

	<html:style>
        .zoteroone-hbox-small-gap {
            flex-shrink: 0;
            gap: 8px;
        }

        .zoteroone-hbox-medium-gap {
            flex-shrink: 0;
            gap: 12px;
        }

        .zoteroone-hbox-large-gap {
            flex-shrink: 0;
            gap: 30px;
        }
	</html:style>

    <linkset>
        <html:link rel="localization" href="ai4paper_preferences.ftl"/>
    </linkset>  

    <vbox id="vboxContainer-elem" flex="1">
        <hbox align="center" class="zoteroone-hbox-medium-gap">
            <label><html:h3 style="font-size: 15px;color: #0091ff;" id="message-label">▌ AI 解读论文 🔒</html:h3></label>

            <hbox align="center">
                <button label="重置" oncommand='methodsBody.resetPrompt("PaperAI")'/>
            </hbox>
        </hbox>

        <box flex="1" class="textarea-box">
            <html:textarea
                    id="prompt-PaperAI"
                    class="plain"
                    multiline="true"
                    placeholder=""
                    style="width:100%;height:150px;padding: 5px;"
                    oninput="methodsBody.updatePrompt();"
            />
        </box>

        <hbox align="center" class="zoteroone-hbox-medium-gap">
            <label><html:h3 style="font-size: 15px;color: #0091ff;" id="message-label">▌ 论文深度解读 🔒</html:h3></label>

            <hbox align="center">
                <button label="重置" oncommand='methodsBody.resetPrompt("PaperDeepInterpretation")'/>
            </hbox>
        </hbox>

        <box flex="1" class="textarea-box">
            <html:textarea
                    id="prompt-PaperDeepInterpretation"
                    class="plain"
                    multiline="true"
                    placeholder=""
                    style="width:100%;height:150px;padding: 5px;"
                    oninput="methodsBody.updatePrompt();"
            />
        </box>

        <hbox align="center" class="zoteroone-hbox-medium-gap">
            <label><html:h3 style="font-size: 15px;color: #0091ff;" id="message-label">▌ 论文简要剖析 🔒</html:h3></label>

            <hbox align="center">
                <button label="重置" oncommand='methodsBody.resetPrompt("PaperBriefAnalysis")'/>
            </hbox>
        </hbox>

        <box flex="1" class="textarea-box">
            <html:textarea
                    id="prompt-PaperBriefAnalysis"
                    class="plain"
                    multiline="true"
                    placeholder=""
                    style="width:100%;height:150px;padding: 5px;"
                    oninput="methodsBody.updatePrompt();"
            />
        </box>

    </vbox>
</dialog>

<keyset>
	<key id="key_close" key="W" modifiers="accel" oncommand="window.close()"/>
</keyset>
</window>
