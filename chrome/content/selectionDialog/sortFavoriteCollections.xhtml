<?xml version="1.0"?>

<?xml-stylesheet href="chrome://global/skin/" type="text/css"?>
<?xml-stylesheet href="chrome://zotero/skin/zotero.css" type="text/css"?>
<?xml-stylesheet href="chrome://zotero-platform/content/zotero.css" type="text/css"?>
<?xml-stylesheet href="chrome://zotero/skin/scaffold.css" type="text/css"?>

<!DOCTYPE window SYSTEM "chrome://zotero/locale/zotero.dtd">
<window xmlns:html="http://www.w3.org/1999/xhtml"
	xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
	id="zoteroone-window-sortFavoriteCollections"
	title="管理已收藏的分类"
	style="min-width: 480px;"
	persist="width height screenX screenY"
	windowtype="zoteroone-windowType-sortFavoriteCollections"
	onload="methodsBody.init()">
<dialog 
	buttons="accept"
    buttonlabelaccept="关闭窗口" 
	id="zoteroone-dialog-sortFavoriteCollections">

	<script>
		Services.scriptloader.loadSubScript("chrome://zotero/content/include.js", this);
		Services.scriptloader.loadSubScript("chrome://ai4paper/content/selectionDialog/sortFavoriteCollections.js", this);
		Services.scriptloader.loadSubScript("chrome://zotero/content/customElements.js", this);
	</script>

	<html:style>
        .zoteroone-hbox-medium-gap {
            flex-shrink: 0;
            gap: 12px;
        }
	</html:style>

	<linkset>
	    <html:link rel="localization" href="ai4paper_preferences.ftl"/>
	</linkset>	

	<vbox id="vboxContainer-elem" flex="1">
        <div class="container" style="display: flex;justify-content: space-between;align-items: center;">

			<hbox align="center">
				<div class="svg-container-enablesvggo2favoritecollection"></div>
				<label><html:h3 style="font-size: 13px;" id="message-label">已收藏的分类</html:h3></label>
	        </hbox>

            <hbox align="center" class="zoteroone-hbox-medium-gap">
            	<button id="view-button-collection" label="分类" oncommand="methodsBody.showItemsByType('collection');"/>
				<button id="view-button-savedSearch" label="保存的搜索" oncommand="methodsBody.showItemsByType('savedSearch');"/>
            </hbox>
        </div>

		<vbox flex="1">
			<box flex="1">
				<richlistbox id="richlistbox-elem" flex="1" style="width:480px;height:500px;"></richlistbox>
			</box>
		</vbox>

	</vbox>
</dialog>

<keyset>
	<key id="key_close" key="W" modifiers="accel" oncommand="window.close();"/>
</keyset>
</window>
