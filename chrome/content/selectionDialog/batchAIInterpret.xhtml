<?xml version="1.0"?>

<?xml-stylesheet href="chrome://global/skin/" type="text/css"?>
<?xml-stylesheet href="chrome://zotero/skin/zotero.css" type="text/css"?>
<?xml-stylesheet href="chrome://zotero-platform/content/zotero.css" type="text/css"?>
<?xml-stylesheet href="chrome://zotero/skin/scaffold.css" type="text/css"?>

<!DOCTYPE window SYSTEM "chrome://zotero/locale/zotero.dtd">
<window xmlns:html="http://www.w3.org/1999/xhtml"
    xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
    title="批量 AI 解读文献"
    style="min-width: 975px;min-height: 650px;"
    persist="width height screenX screenY"
    windowtype="zoteroone-windowType-batchAIInterpret"
    onload="init();">
<dialog 
    buttons="accept"
	buttonlabelaccept="关闭"
    id="zoteroone-dialog-batchAIInterpret">

    <script>
        Services.scriptloader.loadSubScript("chrome://zotero/content/include.js", this);
        Services.scriptloader.loadSubScript("chrome://zoteroif/content/selectionDialog/batchAIInterpret.js", this);
        Services.scriptloader.loadSubScript("chrome://zotero/content/customElements.js", this);
    </script>

    <html:style>
        <![CDATA[
        /* ==================== 全局样式 ==================== */
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f6f7;
            --bg-tertiary: #ebedef;
            --bg-hover: #e8eaed;
            --bg-model: #f6f8fa;
            --bg-filter: #f6f8fa;
            --text-primary: #1a1a2e;
            --text-secondary: #555770;
            --text-muted: #8b8da3;
            --border-color: #d8dae0;
            --accent: #4361ee;
            --accent-light: #eef0ff;
            --accent-hover: #3a56d4;
            --success: #2cb67d;
            --success-light: #eafaf3;
            --warning: #f59e0b;
            --warning-light: #fef9ec;
            --danger: #e63946;
            --danger-light: #fdedef;
            --ring-bg: #e5e7eb;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --radius: 10px;
            --radius-sm: 6px;
            --transition: 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
            font-size: 13px;
            color: var(--text-primary);
            background: var(--bg-secondary);
            overflow: hidden;
        }

        /* ==================== 主布局 ==================== */
        #main-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-height: 100vh;
        }

        /* ==================== 顶部栏 ==================== */
        #header {
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: var(--shadow-sm);
            z-index: 10;
        }

        #header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        #header-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.2px;
        }

        /* 总体进度 */
        #overall-progress-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #overall-bar-wrapper {
            width: 200px;
            height: 6px;
            background: var(--ring-bg);
            border-radius: 3px;
            overflow: hidden;
        }

        #overall-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), var(--success));
            border-radius: 3px;
            transition: width 0.4s ease;
        }

        #overall-text {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            min-width: 90px;
        }

        #header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ==================== 按钮系统 ==================== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 14px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
            line-height: 1.4;
            height: 26px; 
        }

        .btn:hover {
            background: var(--bg-hover);
            border-color: #c0c3ca;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
        }

        .btn-danger {
            color: var(--danger);
            border-color: var(--danger);
        }

        .btn-danger:hover {
            background: var(--danger-light);
        }

        .btn-sm {
            padding: 3px 8px;
            font-size: 11px;
        }

        .btn-icon {
            padding: 4px 10px; 
            min-width: 28px;
            justify-content: center;
        }

        .btn-icon svg {
            width: 14px;
            height: 14px;
        }

        .btn-icon-square {
            padding: 4px;
        }

        /* ==================== 筛选栏 ==================== */
        #filter-bar {
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .filter-btn {
            display: inline-flex;         /* ← 新增：使用 flex 布局 */
            align-items: center;          /* ← 新增：垂直居中对齐 */
            justify-content: center;  
            padding: 4px 12px;
            border: none;
            border-radius: 20px;
            background: var(--bg-filter); 
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: all var(--transition);
        }

        .filter-btn:hover {
            background: var(--bg-hover);  
        }

        .filter-btn.active {
            background: var(--accent-light);
            color: var(--accent);
            font-weight: 600;
        }

        .filter-count {
            font-size: 10px;
            margin-left: 3px;
            opacity: 0.7;
        }

        /* ==================== 任务列表 ==================== */
        #task-list-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 0;                        /* 改为 0，去掉原来的 12px 16px */
            display: flex;
            flex-direction: column;
        }

        #task-list-wrapper::-webkit-scrollbar {
            width: 6px;
        }

        #task-list-wrapper::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        /* ==================== 紧凑任务列表 ==================== */

        /* 列表头（表头行） */
        .task-list-header {
            display: flex;
            flex-direction: row;               /* ← 明确横向 */
            align-items: center;
            gap: 10px;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-secondary);
            position: sticky;
            top: 0;
            z-index: 5;
            user-select: none;
        }

        .col-progress { width: 72px; flex-shrink: 0; }
        .col-title    { flex: 1; min-width: 0; }
        .col-status   { width: 62px; flex-shrink: 0; text-align: center; }
        .col-time     { width: 52px; flex-shrink: 0; text-align: left; }
        .col-chars    { width: 56px; flex-shrink: 0; text-align: left; }
        .col-actions  { width: 60px; flex-shrink: 0; text-align: left; }

        #task-list {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        /* 任务行 */
        .task-card {
            display: flex;
            flex-direction: column;            /* ← 这是关键，让 task-row 和 task-preview 上下排列 */
            border-bottom: 1px solid var(--border-color);
            border-left: 3px solid transparent;          /* ← 新增 */
            background: var(--bg-primary);
            transition: background var(--transition);
            cursor: default;
        }

        .task-card:hover {
            background: var(--bg-hover);
        }

        .task-card.status-running  { border-left: 3px solid var(--accent); }
        .task-card.status-completed { border-left: 3px solid var(--success); }
        .task-card.status-error    { border-left: 3px solid var(--danger); }
        .task-card.status-aborted  { border-left: 3px solid var(--warning); }
        .task-card.status-queued   { border-left: 3px solid var(--border-color); }

        /* 主行 */
        .task-row {
            display: flex;
            flex-direction: row;               /* ← 明确横向 */
            align-items: center;
            gap: 10px;
            padding: 5px 12px 5px 9px;
            min-height: 34px;
        }

        /* 迷你进度条 + 百分比 */
        .task-progress-cell {
            display: flex;
            flex-direction: row;               /* ← 明确横向 */
            align-items: center;
            gap: 5px;
            width: 72px;
            flex-shrink: 0;
        }

        .task-mini-bar {
            flex: 1;
            height: 3px;
            background: var(--ring-bg);
            border-radius: 2px;
            overflow: hidden;
        }

        .task-mini-bar-fill {
            height: 100%;
            border-radius: 2px;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        .task-mini-bar-fill.completed { background: var(--success); }
        .task-mini-bar-fill.error     { background: var(--danger); }
        .task-mini-bar-fill.aborted   { background: var(--warning); }

        .task-pct {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            min-width: 26px;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        /* 标题 */
        .task-title {
            flex: 1;
            min-width: 0;
            font-size: 12.5px;
            font-weight: 500;
            color: var(--text-primary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            line-height: 1.3;
        }

        /* 状态徽章 */
        .task-status-badge {
            display: inline-block;
            width: 62px;
            flex-shrink: 0;
            text-align: center;
            padding: 1px 0;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            line-height: 1.6;
        }

        .badge-queued    { background: var(--bg-tertiary); color: var(--text-muted); }
        .badge-running   { background: var(--accent-light); color: var(--accent); }
        .badge-completed { background: var(--success-light); color: var(--success); }
        .badge-error     { background: var(--danger-light); color: var(--danger); }
        .badge-aborted   { background: var(--warning-light); color: var(--warning); }

        /* 耗时 & 字数 */
        .task-time,
        .task-chars {
            font-size: 11px;
            color: var(--text-muted);
            flex-shrink: 0;
            text-align: left;
            font-variant-numeric: tabular-nums;
        }

        .task-time  { width: 52px; }
        .task-chars { width: 56px; }

        /* 操作按钮组 */
        .task-actions {
            display: flex;
            flex-direction: row;
            gap: 4px;
            flex-shrink: 0;
            width: 60px;
            justify-content: flex-start;
            align-items: center;
        }

        .act-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.15s ease;
            user-select: none;
            text-align: center;
            line-height: 1;
        }

        .act-btn:hover {
            background: var(--bg-tertiary);
        }

        .act-abort {
            color: var(--danger);
        }

        .act-abort:hover {
            background: var(--danger-light);
        }

        .act-retry:hover {
            background: var(--accent-light);
        }

        .act-note:hover {
            background: var(--success-light);
        }

        /* 展开的预览区 */
        .task-preview {
            display: none;
            padding: 0;
            background: var(--bg-secondary);
            border-top: 1px dashed var(--border-color);
        }

        .task-card.expanded .task-preview {
            display: block;
        }

        .task-preview iframe {
            width: 100%;
            height: 200px;
            border: none;
            background: var(--bg-secondary);
            display: block;
        }

        .task-preview-loading {
            padding: 8px 12px;
            color: var(--text-muted);
            font-size: 12px;
        }

        .task-preview-error {
            color: var(--danger);
        }

        /* ==================== 展开折叠按钮（CSS三角形） ==================== */
        .col-expand {
            width: 16px;
            flex-shrink: 0;
        }

        .task-expand-toggle {
            width: 16px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
            user-select: none;
            transition: color 0.15s ease;
            margin: 0;
            padding: 0;
        }

        .task-expand-toggle:hover {
            color: var(--accent);
        }

        /* CSS 三角形：▸ 右箭头 */
        .task-expand-toggle::before {
            content: '';
            display: block;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 4px 0 4px 6px;
            border-color: transparent transparent transparent currentColor;
            transition: transform 0.2s ease;
        }

        /* 展开时旋转 90° 变成 ▾ 下箭头 */
        .task-card.expanded .task-expand-toggle::before {
            transform: rotate(90deg);
        }

        /* ==================== 空状态 ==================== */
        #empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            gap: 12px;
            padding: 40px;
        }

        #empty-state svg {
            width: 64px;
            height: 64px;
            opacity: 0.3;
        }

        #empty-state p {
            font-size: 14px;
        }

        #empty-state .hint {
            font-size: 12px;
            opacity: 0.7;
        }

        /* ==================== 底部状态栏 ==================== */
        #footer {
            background: var(--bg-primary);
            border-top: 1px solid var(--border-color);
            padding: 8px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            font-size: 11px;
            color: var(--text-muted);
        }

        #footer-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        #footer-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #footer-service, #footer-model, #footer-concurrency {
            background: var(--bg-model);
            color: var(--text-muted);
            font-size: 12px;
            padding: 3px 6px;
            border-radius: 15px;
        }

        /* ==================== 设置面板 ==================== */
        #settings-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        #settings-overlay.visible {
            display: flex;
        }

        #settings-panel {
            background: var(--bg-primary);
            border-radius: var(--radius);
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            width: 520px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 24px;
        }

        #settings-panel h3 {
            font-size: 16px;
            margin-bottom: 16px;
        }

        .setting-group {
            margin-bottom: 14px;
        }

        .setting-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text-secondary);
        }

        .setting-group input,
        .setting-group textarea,
        .setting-group select {
            width: 100%;
            padding: 7px 10px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-family: inherit;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .setting-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .setting-group .hint {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .settings-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 18px;
        }

        /* ==================== 全库统计面板 ==================== */
        #stats-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        #stats-overlay.visible {
            display: flex;
        }

        #stats-panel {
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            border-radius: var(--radius);
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 24px;
        }

        #stats-header {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        #stats-title {
            display: inline-block;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* 加载动画 */
        #stats-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 40px 0;
            color: var(--text-muted);
            font-size: 13px;
        }

        #stats-loading.hidden {
            display: none;
        }

        #stats-spinner {
            display: block;
            width: 32px;
            height: 32px;
            border: 3px solid var(--ring-bg);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin-stats 0.8s linear infinite;
        }

        @keyframes spin-stats {
            to { transform: rotate(360deg); }
        }

        /* 统计内容区 */
        #stats-content {
            display: none;
            flex-direction: column;
            width: 100%;
        }

        #stats-content.visible {
            display: flex;
        }

        /* 总览卡片 */
        .stats-summary {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--accent-light);
            border-radius: var(--radius-sm);
            padding: 18px;
            margin-bottom: 20px;
            width: 100%;
        }

        .stats-summary-number {
            display: block;
            font-size: 30px;
            font-weight: 700;
            color: var(--accent);
            line-height: 1.2;
            text-align: center;
        }

        .stats-total-dim {
            font-size: 16px;
            color: var(--text-muted);
            font-weight: 400;
        }

        .stats-summary-label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
            text-align: center;
        }

        .stats-summary-bar {
            display: block;
            width: 100%;
            height: 8px;
            background: var(--ring-bg);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 14px;
        }

        .stats-summary-bar-fill {
            display: block;
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), var(--success));
            border-radius: 4px;
            transition: width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* 分类列表 */
        .stats-table {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .stats-row {
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
            gap: 12px;
            width: 100%;
        }

        .stats-row:last-child {
            border-bottom: none;
        }

        .stats-row-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            min-width: 34px;
            border-radius: 8px;
            font-size: 17px;
            flex-shrink: 0;
            background: var(--bg-tertiary);
        }

        .stats-row-icon-clickable {
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            position: relative;
        }

        .stats-row-icon-clickable:hover {
            transform: scale(1.15);
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
            background: var(--accent-light);
        }

        .stats-row-icon-clickable::after {
            content: attr(data-tip);
            position: absolute;
            bottom: calc(100% + 6px);
            left: 0;
            background: var(--text-primary);
            color: var(--bg-primary);
            font-size: 11px;
            line-height: 1.5;
            padding: 5px 10px;
            border-radius: 5px;
            white-space: pre;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s ease;
            z-index: 10;
        }

        .stats-row-icon-clickable:hover::after {
            opacity: 1;
        }

        .stats-row-icon-clickable:active {
            transform: scale(0.95);
        }

        .stats-row-info {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
        }

        .stats-row-top {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 5px;
            width: 100%;
        }

        .stats-row-name {
            display: inline-block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .stats-row-numbers {
            display: inline-block;
            font-size: 11px;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
        }

        .stats-row-bar {
            display: block;
            width: 100%;
            height: 4px;
            background: var(--ring-bg);
            border-radius: 2px;
            overflow: hidden;
        }

        .stats-row-bar-fill {
            display: block;
            height: 100%;
            width: 0%;
            border-radius: 2px;
            background: var(--accent);
            transition: width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .stats-row-pct {
            display: inline-block;
            width: 46px;
            text-align: right;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            flex-shrink: 0;
            font-variant-numeric: tabular-nums;
        }

        /* 底部信息 */
        .stats-footer-info {
            display: block;
            margin-top: 18px;
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            width: 100%;
        }

        /* ==================== Toast ==================== */
        #toast-container {
            position: fixed;
            bottom: 50px;          /* 改为底部（留出 footer 的空间） */
            right: 16px;
            z-index: 200;
            display: flex;
            flex-direction: column-reverse;  /* 新消息从下往上堆叠 */
            gap: 6px;
        }

        .toast {
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            color: #fff;
            box-shadow: var(--shadow-md);
            animation: toastIn 0.3s ease;
            max-width: 320px;
        }

        .toast-info { background: var(--accent); }
        .toast-success { background: var(--success); }
        .toast-warning { background: var(--warning); color: #333; }
        .toast-error { background: var(--danger); }

        @keyframes toastIn {
            from { transform: translateY(20px); opacity: 0; }   /* 从下方滑入 */
            to { transform: translateY(0); opacity: 1; }
        }

        /* ==================== 右键菜单 ==================== */
        #context-menu {
            display: none;
            position: fixed;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-md);
            padding: 4px 0;
            z-index: 150;
            min-width: 180px;
        }

        #context-menu.visible {
            display: block;
        }

        .ctx-item {
            padding: 6px 14px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
        }

        .ctx-item:hover {
            background: var(--accent-light);
            color: var(--accent);
        }

        .ctx-item svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        .ctx-divider {
            height: 1px;
            background: var(--border-color);
            margin: 3px 0;
        }

        /* ==================== 深色模式 ==================== */
        @media (prefers-color-scheme: dark) {
            :root {
                /* 背景层级：纯中性灰，无蓝色调 */
                --bg-primary: #1e1e1e;
                --bg-secondary: #161616;
                --bg-tertiary: #2a2a2a;
                --bg-hover: #252525;
                --bg-model: #232323;
                --bg-filter: #2a2a2a;

                /* 文字：暖灰，降低刺眼感 */
                --text-primary: #d1d1d1;
                --text-secondary: #a0a0a0;
                --text-muted: #6b6b6b;

                /* 主题色：柔蓝，降低饱和度融入灰调 */
                --accent: #6ea1f7;
                --accent-light: rgba(110, 161, 247, 0.10);
                --accent-hover: #85b3fa;

                /* 语义色：全部降饱和，与灰底和谐 */
                --success: #6ec878;
                --success-light: rgba(110, 200, 120, 0.10);
                --warning: #d9b455;
                --warning-light: rgba(217, 180, 85, 0.10);
                --danger: #d46a6a;
                --danger-light: rgba(212, 106, 106, 0.10);

                /* 边框 & 基底 */
                --border-color: #303030;
                --ring-bg: #333333;

                /* 阴影加深 */
                --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.4);
                --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.55);
            }

            /* 滚动条 */
            #task-list-wrapper::-webkit-scrollbar-thumb {
                background: #484848;
            }

            /* 普通按钮悬停：边框柔和 */
            .btn:hover {
                border-color: #484848;
            }

            /* 主按钮：浅色底 + 深色字 */
            .btn-primary {
                color: #141414;
            }
            .btn-primary:hover {
                color: #141414;
            }

            /* 总进度条渐变 */
            #overall-bar-fill {
                background: linear-gradient(90deg, #6ea1f7, #6ec878);
            }

            /* Toast 深底浅字 */
            .toast {
                color: #e0e0e0;
                box-shadow: none;
            }
            .toast-info    { background: #2c3e5e; }
            .toast-success { background: #274832; }
            .toast-warning { background: #4a3c1a; color: #e8d5a0; }
            .toast-error   { background: #4a2020; }

            /* 设置遮罩加深 */
            #settings-overlay {
                background: rgba(0, 0, 0, 0.60);
            }

            /* 设置面板输入框 */
            .setting-group input,
            .setting-group textarea,
            .setting-group select {
                background: #232323;
                color: #d1d1d1;
                border-color: #3a3a3a;
            }

            #stats-overlay {
                background: rgba(0,0,0,0.60);
            }
        }
    ]]>
