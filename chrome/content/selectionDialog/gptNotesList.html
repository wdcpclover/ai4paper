<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>gptNotesList</title>

    <!-- Markdown 和 LaTeX 渲染 -->
    <!-- 其实这里只需要 css，不需要 js 了，因为调用的是在 gptChatUI.js 中注入的函数 -->
    <script src="chrome://zoteroif/content/assets/js/markdown-it.min.js"></script>
    <script src="chrome://zoteroif/content/assets/js/katex.min.js"></script>
    <script src="chrome://zoteroif/content/assets/js/texmath.min.js"></script>
    <link type="text/css" rel="stylesheet" href="chrome://zoteroif/content/assets/css/katex.min.css">
    <link type="text/css" rel="stylesheet" href="chrome://zoteroif/content/assets/css/texmath.min.css">

    <!-- highlight.js 代码块高亮 -->
    <script src="chrome://zoteroif/content/assets/js/highlight.min.js"></script>
    <!-- 辅助 highlight.js 高亮代码块 css/highlight -->
    <link id="highlightStyle" rel="stylesheet" type="text/css" href="chrome://zoteroif/content/assets/css/highlight/github.min.css">
    <!-- github markdown 风格，连同 highlight 一起优化代码块样式 css/highlight -->
    <link rel="stylesheet" type="text/css" href="chrome://zoteroif/content/assets/css/highlight/github-markdown.min.css">

    <script src="chrome://zoteroif/content/assets/js/marked.min.js"></script>
    <script src="chrome://zoteroif/content/selectionDialog/gptNotesList.js"></script>
    <script src="chrome://zotero/content/include.js"></script>
    <style id="chatUIStyle">

    </style>
</head>
<body onload='init();'>

    <div id="chat-container" class="chat-container">

    </div>

    <div style="position: relative; width: 100%;">

        <textarea id="message-edit" 
                class="textarea-box"
                placeholder="在此编辑要修改的消息" 
                style="border: 0;width:100%;height:120px;font-family: Arial, sans-serif;padding: 5px 8px 5px 8px;font-size:13px;resize:vertical;box-sizing: border-box;outline: none;" 
                onkeydown="messageInput_checkKeyEnter(event);">
        </textarea>

        <div id="finishEditing-button" 
               class="quickButton svg-container-finish" 
               style="right: 10px;display:none;" 
               title="点击以完成编辑" 
               onmouseover="updateButtonBgColor(this);" 
               onmouseout="this.style.background='';" 
               onclick='finishEditMessage();'
        ></div>
        <div id="cancelEditing-button"
               class="quickButton svg-container-cancel" 
               style="right: 40px;display:none;" 
               title="取消编辑" 
               onmouseover="updateButtonBgColor(this);" 
               onmouseout="this.style.background='';" 
               onclick='cancelEditMessage();'
        ></div>

    </div>

</body>
</html>
