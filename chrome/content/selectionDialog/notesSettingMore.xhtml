<?xml version="1.0"?>

<?xml-stylesheet href="chrome://global/skin/" type="text/css"?>
<?xml-stylesheet href="chrome://zotero/skin/zotero.css" type="text/css"?>
<?xml-stylesheet href="chrome://zotero-platform/content/zotero.css" type="text/css"?>
<?xml-stylesheet href="chrome://zotero/skin/scaffold.css" type="text/css"?>

<?xml-stylesheet href="chrome://ai4paper/content/assets/css/style.css" type="text/css"?>

<!DOCTYPE window SYSTEM "chrome://zotero/locale/zotero.dtd">
<window xmlns:html="http://www.w3.org/1999/xhtml"
	xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
    title="更多设置"
    style="min-width: 380px;" 
    persist="width height screenX screenY"
    windowtype="zoteroone-windowType-notesSettingMore"
	onload="methodsBody.init();">
<dialog 
	buttons="accept"
    buttonlabelaccept="关闭窗口" 
	id="zoteroone-dialog-notesSettingMore">

	<script>
		Services.scriptloader.loadSubScript("chrome://zotero/content/include.js", this);
		Services.scriptloader.loadSubScript("chrome://zotero/content/customElements.js", this);

        Services.scriptloader.loadSubScript("chrome://ai4paper/content/selectionDialog/notesSettingMore.js", this);
	</script>

	<html:style>
        .zoteroone-hbox-small-gap {
            flex-shrink: 0;
            gap: 8px;
        }

        .zoteroone-hbox-medium-gap {
            flex-shrink: 0;
            gap: 12px;
        }

        .zoteroone-hbox-large-gap {
            flex-shrink: 0;
            gap: 30px;
        }
	</html:style>

	<linkset>
	    <html:link rel="localization" href="ai4paper_preferences.ftl"/>
	</linkset>

	    <vbox id="vboxContainer-elem" flex="1">
        <!-- <description style="white-space: pre-wrap; color: gray; font-size: 20px; font-weight: bold;">更多设置</description> -->

        <box flex="1">
            <richlistbox id="richlistbox-elem" flex="1" style='height:550px;padding-left: 5px;margin-top: 8px;'>

                <!-- * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * ▌笔记导出 * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * -->

                <description style="white-space: pre-wrap; color: #8138ff; margin-top: 10px; margin-bottom: 10px; font-size: 15px; font-weight: bold;">▌笔记导出</description>

                    <html:div class="two-columns">
                        <hbox align="center">
                            <checkbox id="zotero-if-xul-export-annotations-notes" label='导出注释笔记' checked="true" native="true" oncommand="methodsBody.run()"/>
                        </hbox>

                        <hbox align="center">
                            <checkbox id="zotero-if-xul-export-vocabulary-notes" label='导出生词' checked="true" native="true" oncommand="methodsBody.run()"/>
                        </hbox>
                    </html:div>


                    <html:div class="two-columns">
                        <hbox align="center">
                            <checkbox id="zotero-if-xul-export-chatgpt-notes" label='导出 GPT 笔记' checked="true" native="true" oncommand="methodsBody.run()"/>
                        </hbox>

                        <hbox align="center">
                            <checkbox id="zotero-if-xul-exportAIReadingNotes" label='导出 AI 文献解读' checked="true" native="true" oncommand="methodsBody.run()"/>
                        </hbox>
                    </html:div>

                    <html:div class="two-columns">
                        <hbox align="center">
                            <checkbox id="zotero-if-xul-export-translation-notes" label='导出划词翻译' checked="true" native="true" oncommand="methodsBody.run()"/>
                        </hbox>
                    </html:div>


                <hbox align="center" style="margin-top: 15px;">
                    <label value="🔘 不生成笔记的注释类型"/>
                    <menulist native="true" id="zotero-if-xul-annotaionimage-color-excluded" maxwidth="70" oncommand="methodsBody.run()">
                        <menupopup>
                            <menuitem label="黄色（高亮）"/>
                            <menuitem label="红色（高亮）"/>
                            <menuitem label="绿色（高亮）"/>
                            <menuitem label="蓝色（高亮）"/>
                            <menuitem label="紫色（高亮）"/>
                            <menuitem label="洋红色（高亮）"/>
                            <menuitem label="橘色（高亮）"/>
                            <menuitem label="灰色（高亮）"/>
                            <menuitem label="黄色（下划线）"/>
                            <menuitem label="红色（下划线）"/>
                            <menuitem label="绿色（下划线）"/>
                            <menuitem label="蓝色（下划线）"/>
                            <menuitem label="紫色（下划线）"/>
                            <menuitem label="洋红色（下划线）"/>
                            <menuitem label="橘色（下划线）"/>
                            <menuitem label="灰色（下划线）"/>
                            <menuitem label="黄色（下划线与文本）"/>
                            <menuitem label="红色（下划线与文本）"/>
                            <menuitem label="绿色（下划线与文本）"/>
                            <menuitem label="蓝色（下划线与文本）"/>
                            <menuitem label="紫色（下划线与文本）"/>
                            <menuitem label="洋红色（下划线与文本）"/>
                            <menuitem label="橘色（下划线与文本）"/>
                            <menuitem label="灰色（下划线与文本）"/>
                            <menuitem label="全部颜色（下划线）"/>
                            <menuitem label="全部颜色（文本）"/>
                            <menuitem label="全部颜色（下划线与文本）"/>
                            <menuitem label="无"/>
                        </menupopup>
                    </menulist>
                </hbox>

                <!-- * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * ▌图片笔记 * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * -->

                <description style="white-space: pre-wrap; color: #8138ff; margin-top: 10px; margin-bottom: 10px; font-size: 15px; font-weight: bold;">▌图片笔记</description>

                <hbox align="center">
                    <label value="🔘 框选图片时" />
                    <menulist native="true" id="zotero-if-xul-annotaionimage-actions" oncommand="methodsBody.run()">
                        <menupopup>
                            <menuitem label="无操作"/>
                            <menuitem label="自动拷贝图片"/>
                            <menuitem label="自动通过 PicGo 上传至图床"/>
                        </menupopup>
                    </menulist>
                </hbox>
                
                <hbox align="center">
                    <label value="🔘 图片宽度"/>
                    <menulist native="true" id="zotero-if-xul-annotaionimage-image-width" oncommand="methodsBody.run()">
                        <menupopup>
                            <menuitem label="200px" value="200px"/>
                            <menuitem label="300px" value="300px"/>
                            <menuitem label="500px" value="500px"/>
                            <menuitem label="600px" value="600px"/>
                            <menuitem label="700px" value="700px"/>
                            <menuitem label="800px" value="800px"/>
                        </menupopup>
                    </menulist>
                </hbox>

                <hbox align="center">
                    <checkbox id="zotero-if-xul-obsidian-images-tags-specific" label='图库标签单独管理' checked="true" native="true" oncommand="methodsBody.run()"/>
                </hbox>

                <!-- * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * ▌笔记样式 * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * -->

                <description style="white-space: pre-wrap; color: #8138ff; margin-top: 10px; margin-bottom: 10px; font-size: 15px; font-weight: bold;">▌笔记样式</description>

                <hbox align="center">
                    <label value="🔘 回链样式"/>
                    <menulist native="true" id="zotero-if-xul-cardLink-style" oncommand="methodsBody.run()">
                        <menupopup>
                            <menuitem label="页码"/>
                            <menuitem label="作者年份页码"/>
                        </menupopup>
                    </menulist>
                </hbox>

                <hbox align="center">
                    <label value="🔘 注释笔记行距"/>
                    <!-- maxwidth="100" -->
                    <!-- flex="1"  -->
                    <menulist native="true" id="zotero-if-xul-autoannotationsnote-lineheight" oncommand="methodsBody.run()">
                        <menupopup>
                            <menuitem label="紧凑型"/>
                            <menuitem label="宽松型"/>
                        </menupopup>
                    </menulist>
                </hbox>

                <hbox align="center">
                    <checkbox id="zotero-if-xul-obsidian-cardNotes-date" label='生成卡片时间戳' checked="true" native="true" oncommand="methodsBody.run()"/>
                </hbox>

                <hbox align="center">
                    <checkbox id="zotero-if-xul-export-notes-creators-no-internal-links" label='去除作者内链' checked="true" native="true" oncommand="methodsBody.run()"/>
                </hbox>

                <!-- * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * ▌注释笔记附件 * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * -->

                <description style="white-space: pre-wrap; color: #8138ff; margin-top: 10px; margin-bottom: 10px; font-size: 15px; font-weight: bold;">▌注释笔记附件</description>

                <hbox align="center">
                    <checkbox id="zotero-if-xul-autoannotationsnote" label='自动生成注释笔记附件' checked="false" native="true" oncommand="methodsBody.run()"/>
                </hbox>

                <!-- * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * ▌注释高亮色透明度 * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * -->

                <description style="white-space: pre-wrap; color: #8138ff; margin-top: 10px; margin-bottom: 10px; font-size: 15px; font-weight: bold;">▌高亮色透明度（0-99）</description>

                <html:div class="two-columns">
                    <hbox align="center" flex="1">
                        <label value="黄色：   "/>
                    </hbox>
                    <hbox align="center" flex="1">
                        <html:input type="text" style="margin-left: 10px;" id="highlightColor-yellowtransparency" size="10" flex="1" oninput="methodsBody.setTransparency();"></html:input>
                    </hbox>
                </html:div>

                <html:div class="two-columns">
                    <hbox align="center" flex="1">
                        <label value="红色：   "/>
                    </hbox>
                    <hbox align="center" flex="1">
                        <html:input type="text" style="margin-left: 10px;" id="highlightColor-redtransparency" size="10" flex="1" oninput="methodsBody.setTransparency();"></html:input>
                    </hbox>
                </html:div>

                <html:div class="two-columns">
                    <hbox align="center" flex="1">
                        <label value="绿色：   "/>
                    </hbox>
                    <hbox align="center" flex="1">
                        <html:input type="text" style="margin-left: 10px;" id="highlightColor-greentransparency" size="10" flex="1" oninput="methodsBody.setTransparency();"></html:input>
                    </hbox>
                </html:div>

                <html:div class="two-columns">
                    <hbox align="center" flex="1">
                        <label value="蓝色：   "/>
                    </hbox>
                    <hbox align="center" flex="1">
                        <html:input type="text" style="margin-left: 10px;" id="highlightColor-bluetransparency" size="10" flex="1" oninput="methodsBody.setTransparency();"></html:input>
                    </hbox>
                </html:div>

                <html:div class="two-columns">
                    <hbox align="center" flex="1">
                        <label value="紫色：   "/>
                    </hbox>
                    <hbox align="center" flex="1">
                        <html:input type="text" style="margin-left: 10px;" id="highlightColor-purpletransparency" size="10" flex="1" oninput="methodsBody.setTransparency();"></html:input>
                    </hbox>
                </html:div>

                <html:div class="two-columns">
                    <hbox align="center" flex="1">
                        <label value="洋红色：   "/>
                    </hbox>
                    <hbox align="center" flex="1">
                        <html:input type="text" style="margin-left: 10px;" id="highlightColor-magentatransparency" size="10" flex="1" oninput="methodsBody.setTransparency();"></html:input>
                    </hbox>
                </html:div>

                <html:div class="two-columns">
                    <hbox align="center" flex="1">
                        <label value="橘色：   "/>
                    </hbox>
                    <hbox align="center" flex="1">
                        <html:input type="text" style="margin-left: 10px;" id="highlightColor-orangetransparency" size="10" flex="1" oninput="methodsBody.setTransparency();"></html:input>
                    </hbox>
                </html:div>

                <html:div class="two-columns">
                    <hbox align="center" flex="1">
                        <label value="灰色：   "/>
                    </hbox>
                    <hbox align="center" flex="1">
                        <html:input type="text" style="margin-left: 10px;" id="highlightColor-graytransparency" size="10" flex="1" oninput="methodsBody.setTransparency();"></html:input>
                    </hbox>
                </html:div>

            </richlistbox>
        </box>
    </vbox>
</dialog>

<keyset>
	<key id="key_close" key="W" modifiers="accel" oncommand="window.close()"/>
</keyset>
</window>
