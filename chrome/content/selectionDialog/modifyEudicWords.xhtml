<?xml version="1.0"?>

<?xml-stylesheet href="chrome://global/skin/" type="text/css"?>
<?xml-stylesheet href="chrome://zotero/skin/zotero.css" type="text/css"?>
<?xml-stylesheet href="chrome://zotero-platform/content/zotero.css" type="text/css"?>
<?xml-stylesheet href="chrome://zotero/skin/scaffold.css" type="text/css"?>

<?xml-stylesheet href="chrome://zoteroif/content/assets/css/style.css" type="text/css"?>

<!DOCTYPE window SYSTEM "chrome://zotero/locale/zotero.dtd">
<window xmlns:html="http://www.w3.org/1999/xhtml"
    xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
    title="修改生词"
    style="min-width: 400px;" 
    persist="width height screenX screenY"
    windowtype="zoteroone-windowType-modifyEudicWords"
    onload="methodsBody.init()">
<dialog 
    buttons="cancel,accept"
    id="ZoteroOneDialog-modifyEudicWords">

    <script>
        Services.scriptloader.loadSubScript("chrome://zotero/content/include.js", this);
        Services.scriptloader.loadSubScript("chrome://zotero/content/customElements.js", this);

        Services.scriptloader.loadSubScript("chrome://zoteroif/content/selectionDialog/modifyEudicWords.js", this);
    </script>

	<html:style>
		.XUL-Button {
			margin-right: 10px;
		}

        .zoteroone-hbox-small-gap {
            flex-shrink: 0;
            gap: 6px;
        }

        .zoteroone-hbox-medium-gap {
            flex-shrink: 0;
            gap: 12px;
        }

        .zoteroone-hbox-large-gap {
            flex-shrink: 0;
            gap: 18px;
        }


		#category-list radio {
			margin-bottom: 6px;
		}
	</html:style>

    <linkset>
        <html:link rel="localization" href="zoteroif_preferences.ftl"/>
    </linkset>  

    <vbox id="vboxContainer-elem" flex="1">
        <hbox align="center" style="margin-bottom:10px;">
            <div class="svg-container-rename"></div>
            <label value="修改生词"/>
            <checkbox id="keepCase" label='保留原大小写（针对单词）' checked="false" native="true"/>
        </hbox>

        <box flex="1" class="textarea-box">
            <html:textarea
                    id="words-modify-textarea"
                    class="plain"
                    multiline="true"
                    style="width:100%;height:100px;font-size: 13px;padding: 5px;"
            />
        </box>

        <hbox align="center" class="zoteroone-hbox-medium-gap" style="margin-bottom:10px;margin-top:10px;">
            <hbox align="center">
                <div class="svg-container-eudic_catagory"></div>
                <label value="选择生词本"/>
            </hbox>

            <button id="updateCategoriesList.button" 
                    label="刷新" 
                    oncommand="methodsBody.updateCategoriesList();"></button>
            <button id="setAsDefaultCategory.button" 
                    label="选择默认生词本" 
                    oncommand="methodsBody.setAsDefaultCategory(true);"></button>
        </hbox>
        <!-- 有些用户可能有很多很多生词本，防止溢出屏幕，因此用 richlistbox -->
        <box flex="1">
            <richlistbox id="richlistbox-elem" flex="1" style="width: 400px;height:160px;">
                <radiogroup id="category-list">
                </radiogroup>
            </richlistbox>
        </box>
    </vbox>
</dialog>

<keyset>
	<key id="key_close" key="W" modifiers="accel" oncommand="window.close()"/>
</keyset>
</window>
