<?xml version="1.0"?>

<?xml-stylesheet href="chrome://global/skin/" type="text/css"?>
<?xml-stylesheet href="chrome://zotero/skin/zotero.css" type="text/css"?>
<?xml-stylesheet href="chrome://zotero-platform/content/zotero.css" type="text/css"?>
<?xml-stylesheet href="chrome://zotero/skin/scaffold.css" type="text/css"?>

<!DOCTYPE window SYSTEM "chrome://zotero/locale/zotero.dtd">
<window xmlns:html="http://www.w3.org/1999/xhtml"
    xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
    id="zoteroone-window-selectRelatedItems"
    title="选择关联文献"
    style="min-width: 1000px;" 
    persist="width height screenX screenY"
    windowtype="zoteroone-windowType-selectRelatedItems"
    onload="methodsBody.init();">
<dialog 
    buttons="cancel,accept"
    id="zoteroone-dialog-selectRelatedItems">

    <script>
        Services.scriptloader.loadSubScript("chrome://zotero/content/include.js", this);
        Services.scriptloader.loadSubScript("chrome://zotero/content/customElements.js", this);

        Services.scriptloader.loadSubScript("chrome://ai4paper/content/selectionDialog/selectRelatedItems.js", this);
    </script>

	<html:style>
        .zoteroone-hbox-small-gap {
            flex-shrink: 0;
            gap: 8px;
        }

        .zoteroone-hbox-medium-gap {
            flex-shrink: 0;
            gap: 12px;
        }

        .zoteroone-hbox-large-gap {
            flex-shrink: 0;
            gap: 30px;
        }
	</html:style>

    <linkset>
        <html:link rel="localization" href="ai4paper_preferences.ftl"/>
    </linkset>  

    <vbox id="vboxContainer-elem" flex="1">
        <div class="container" style="display: flex;justify-content: space-between;align-items: center;">
            <hbox align="center">
                <div class="svg-container-related"></div>
                <!-- removeRelatedItems 和 showSelectedRelatedItems 调用的同一个 dialog。 -->
                <label><html:h3 style="font-size: 13px;" id="zotero-selectRelatedItems-intro">选择要显示的关联文献</html:h3></label>
            </hbox>

            <hbox align="center" class="zoteroone-hbox-medium-gap">
				<button id="adjustWindowWidth-button" label="最大宽度" oncommand='methodsBody.maxWindowWidth();'/>
				<button id="adjustWindowWidth-button" label="合适宽度" oncommand='methodsBody.adjustWindowWidthPercent();'/>
            </hbox>
        </div>

        <box flex="1">
            <richlistbox id="zotero-selectRelatedItems-links" flex="1" style="width: 800px;height:440px;"></richlistbox>
        </box>

        <hbox align="center" style="margin-top: 10px;" class="zoteroone-hbox-medium-gap">
            <button label="全选" oncommand="methodsBody.selectAll()"/>
            <button label="取消全选" oncommand="methodsBody.selectAll(true)"/>
        </hbox>
    </vbox>
</dialog>

<keyset>
	<key id="key_close" key="W" modifiers="accel" oncommand="window.close()"/>
</keyset>
</window>
