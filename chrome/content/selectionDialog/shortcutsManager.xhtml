    <html:style>
        .navigate-button {

        }

       }
       .buttonIcon:hover {
              transform: scale(1.1);
       }
       .buttonIcon:not(:hover) {
              transform: scale(1);
       }
    </html:style>

        <html:link rel="localization" href="zoteroif_preferences.ftl"/>
