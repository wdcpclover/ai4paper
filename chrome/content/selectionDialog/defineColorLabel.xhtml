<?xml version="1.0"?>

<?xml-stylesheet href="chrome://global/skin/" type="text/css"?>
<?xml-stylesheet href="chrome://zotero/skin/zotero.css" type="text/css"?>
<?xml-stylesheet href="chrome://zotero-platform/content/zotero.css" type="text/css"?>
<?xml-stylesheet href="chrome://zotero/skin/scaffold.css" type="text/css"?>

<?xml-stylesheet href="chrome://ai4paper/content/assets/css/style.css" type="text/css"?>

<!DOCTYPE window SYSTEM "chrome://zotero/locale/zotero.dtd">
<window xmlns:html="http://www.w3.org/1999/xhtml"
    xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
    title="自定注释颜色名称"
    style="min-width: 270px;"
    persist="width height screenX screenY"
    windowtype="zoteroone-windowType-defineColorLabel"
    onload="methodsBody.init();">
<dialog 
    buttons="accept"
    buttonlabelaccept="关闭窗口" 
    id="ZoteroOneDialog-defineColorLabel">

    <script>
        Services.scriptloader.loadSubScript("chrome://zotero/content/include.js", this);
        Services.scriptloader.loadSubScript("chrome://ai4paper/content/selectionDialog/defineColorLabel.js", this);
        Services.scriptloader.loadSubScript("chrome://zotero/content/customElements.js", this);
    </script>

    <linkset>
        <html:link rel="localization" href="ai4paper_preferences.ftl"/>
    </linkset>  

    <vbox id="vboxContainer-elem" flex="1">
        <hbox align="center" style="margin-bottom:10px;">
            <checkbox id="ai4paper.ColorLabel.enable" label='启用自定义颜色名称' checked="false" native="true" oncommand="methodsBody.enableColorLabel();"/>
        </hbox>

        <box flex="1">
            <richlistbox id="richlistbox-elem" flex="1" style='padding-left: 5px;'>
                <html:div class="two-columns">
                    <hbox align="center" flex="1">
                        <label value="黄色：   "/>
                    </hbox>
                    <hbox align="center" flex="1">
                        <html:input type="text" style="margin-left: 10px;" id="ai4paper.defineColorLabel.yellow" size="10" flex="1" oninput="methodsBody.setColorLabel();"></html:input>
                    </hbox>
                </html:div>

                <html:div class="two-columns">
                    <hbox align="center" flex="1">
                        <label value="红色：   "/>
                    </hbox>
                    <hbox align="center" flex="1">
                        <html:input type="text" style="margin-left: 10px;" id="ai4paper.defineColorLabel.red" size="10" flex="1" oninput="methodsBody.setColorLabel();"></html:input>
                    </hbox>
                </html:div>

                <html:div class="two-columns">
                    <hbox align="center" flex="1">
                        <label value="绿色：   "/>
                    </hbox>
                    <hbox align="center" flex="1">
                        <html:input type="text" style="margin-left: 10px;" id="ai4paper.defineColorLabel.green" size="10" flex="1" oninput="methodsBody.setColorLabel();"></html:input>
                    </hbox>
                </html:div>

                <html:div class="two-columns">
                    <hbox align="center" flex="1">
                        <label value="蓝色：   "/>
                    </hbox>
                    <hbox align="center" flex="1">
                        <html:input type="text" style="margin-left: 10px;" id="ai4paper.defineColorLabel.blue" size="10" flex="1" oninput="methodsBody.setColorLabel();"></html:input>
                    </hbox>
                </html:div>

                <html:div class="two-columns">
                    <hbox align="center" flex="1">
                        <label value="紫色：   "/>
                    </hbox>
                    <hbox align="center" flex="1">
                        <html:input type="text" style="margin-left: 10px;" id="ai4paper.defineColorLabel.purple" size="10" flex="1" oninput="methodsBody.setColorLabel();"></html:input>
                    </hbox>
                </html:div>

                <html:div class="two-columns">
                    <hbox align="center" flex="1">
                        <label value="洋红色："/>
                    </hbox>
                    <hbox align="center" flex="1">
                        <html:input type="text" style="margin-left: 10px;" id="ai4paper.defineColorLabel.magenta" size="10" flex="1" oninput="methodsBody.setColorLabel();"></html:input>
                    </hbox>
                </html:div>

                <html:div class="two-columns">
                    <hbox align="center" flex="1">
                        <label value="橘色：   "/>
                    </hbox>
                    <hbox align="center" flex="1">
                        <html:input type="text" style="margin-left: 10px;" id="ai4paper.defineColorLabel.orange" size="10" flex="1" oninput="methodsBody.setColorLabel();"></html:input>
                    </hbox>
                </html:div>

                <html:div class="two-columns">
                    <hbox align="center" flex="1">
                        <label value="灰色：   "/>
                    </hbox>
                    <hbox align="center" flex="1">
                        <html:input type="text" style="margin-left: 10px;" id="ai4paper.defineColorLabel.gray" size="10" flex="1" oninput="methodsBody.setColorLabel();"></html:input>
                    </hbox>
                </html:div>
            </richlistbox>
        </box>

    </vbox>
</dialog>

<keyset>
	<key id="key_close" key="W" modifiers="accel" oncommand="window.close()"/>
</keyset>
</window>
