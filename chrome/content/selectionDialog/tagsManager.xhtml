<!DOCTYPE window SYSTEM "chrome://zotero/locale/zotero.dtd">
<window xmlns:html="http://www.w3.org/1999/xhtml"
	xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
	id="zoteroone-window-tagsManager"
	title="标签管理器" 
	style="min-width: 570px; min-height: 720px;"
	persist="width height screenX screenY"
	windowtype="zoteroone-windowType-tagsManager"
	onload="methodsBody.init();">
<dialog 
	buttons="cancel"
	buttonlabelcancel="关闭窗口" 
	id="zoteroone-dialog-tagsManager">

	<script>
		Services.scriptloader.loadSubScript("chrome://zotero/content/include.js", this);
		Services.scriptloader.loadSubScript("chrome://zotero/content/customElements.js", this);

		Services.scriptloader.loadSubScript("chrome://zoteroif/content/selectionDialog/tagsManager.js", this);
	</script>

	<html:style>
        .zoteroone-hbox-small-gap {
            flex-shrink: 0;
            gap: 8px;
        }

        .zoteroone-hbox-medium-gap {
            flex-shrink: 0;
            gap: 12px;
        }

        .zoteroone-hbox-large-gap {
            flex-shrink: 0;
            gap: 15px;
        }
	</html:style>

	<linkset>
	    <html:link rel="localization" href="zoteroif_preferences.ftl"/>
	</linkset>	

	<vbox flex="1">
        <div class="container" style="display: flex;justify-content: space-between;align-items: center;">
			<hbox align="center">
				<image id="annotationTagType-image" src="chrome://zoteroif/content/icons/annotationTag.png" tooltiptext="刷新注释标签" onclick="methodsBody.updateAnnotationTagsDialog()" style="width:32px;height:32px;"/>
				<label><html:h3 style="font-size: 13px;" id="message-label">选一个注释标签</html:h3></label>
				<label><html:h3 style="font-size: 13px;" id="message-label-nestedView">选一个注释标签</html:h3></label>
			</hbox>
	        
            <hbox align="center" class="zoteroone-hbox-medium-gap">
            	<button id="tagsGeneralView-button" label="普通视图" oncommand="methodsBody.setTagsView('GeneralView');"/>
				<button id="tagsNestedView-button" label="嵌套视图" oncommand="methodsBody.setTagsView('NestedView');"/>
            </hbox>
        </div>

		<vbox id="tagsGeneralView" flex="1">

			<hbox align="center" class="zoteroone-hbox-large-gap" style="padding-top: 3px;padding-bottom: 3px;">
				<button id="annotationTagButton" label="注释标签" oncommand="methodsBody.annotationTag();"/>
				<!-- <image src="chrome://zoteroif/content/icons/update.png" tooltiptext="刷新注释标签" onclick="methodsBody.updateTags('annotationTag');" style="width:32px;height:32px;"/> -->
				<div class="svg-container-update"
					tooltiptext="刷新注释标签" 
					onclick="methodsBody.updateTags('annotationTag');">
				</div>
				<!-- <label value=" "/> -->
				<button id="imageAnnotationTagButton" label="图片注释标签" oncommand="methodsBody.imageAnnotationTag();"/>
				<!-- <image src="chrome://zoteroif/content/icons/update.png" tooltiptext="刷新图片注释标签" onclick="methodsBody.updateTags('imageAnnotationTag');" style="width:32px;height:32px;"/> -->
				<div class="svg-container-update"
					tooltiptext="刷新图片注释标签" 
					onclick="methodsBody.updateTags('imageAnnotationTag');">
				</div>
				<!-- <label value=" "/> -->
				<button id="itemTagButton" label="条目标签" oncommand="methodsBody.itemTag();"/>
				<!-- <image src="chrome://zoteroif/content/icons/update.png" tooltiptext="刷新条目标签" onclick="methodsBody.updateTags('itemTag');" style="width:32px;height:32px;"/> -->
				<div class="svg-container-update"
					tooltiptext="刷新条目标签" 
					onclick="methodsBody.updateTags('itemTag');">
				</div>
				<!-- <label value=" "/> -->
				<button id="gptNoteTagButton" label="GPT 标签" oncommand="methodsBody.gptNoteTag();"/>
				<!-- <image src="chrome://zoteroif/content/icons/update.png" tooltiptext="刷新 GPT 笔记标签" onclick="methodsBody.updateTags('gptNoteTag');" style="width:32px;height:32px;"/> -->
				<div class="svg-container-update"
					tooltiptext="刷新 GPT 笔记标签" 
					onclick="methodsBody.updateTags('gptNoteTag');">
				</div>
			</hbox>

			<hbox align="center">
				<image id="tagFilter-A" src="chrome://zoteroif/content/icons/A.png" tooltiptext="A"  onclick="methodsBody.filter('A')" class="filter-character"/>
				<image id="tagFilter-B" src="chrome://zoteroif/content/icons/B.png" tooltiptext="B"  onclick="methodsBody.filter('B')" class="filter-character"/>
				<image id="tagFilter-C" src="chrome://zoteroif/content/icons/C.png" tooltiptext="C"  onclick="methodsBody.filter('C')" class="filter-character"/>
				<image id="tagFilter-D" src="chrome://zoteroif/content/icons/D.png" tooltiptext="D"  onclick="methodsBody.filter('D')" class="filter-character"/>
				<image id="tagFilter-E" src="chrome://zoteroif/content/icons/E.png" tooltiptext="E"  onclick="methodsBody.filter('E')" class="filter-character"/>
				<image id="tagFilter-F" src="chrome://zoteroif/content/icons/F.png" tooltiptext="F"  onclick="methodsBody.filter('F')" class="filter-character"/>
				<image id="tagFilter-G" src="chrome://zoteroif/content/icons/G.png" tooltiptext="G"  onclick="methodsBody.filter('G')" class="filter-character"/>
				<image id="tagFilter-H" src="chrome://zoteroif/content/icons/H.png" tooltiptext="H"  onclick="methodsBody.filter('H')" class="filter-character"/>
				<image id="tagFilter-I" src="chrome://zoteroif/content/icons/I.png" tooltiptext="I"  onclick="methodsBody.filter('I')" class="filter-character"/>
				<image id="tagFilter-J" src="chrome://zoteroif/content/icons/J.png" tooltiptext="J"  onclick="methodsBody.filter('J')" class="filter-character"/>
				<image id="tagFilter-K" src="chrome://zoteroif/content/icons/K.png" tooltiptext="K"  onclick="methodsBody.filter('K')" class="filter-character"/>
				<image id="tagFilter-L" src="chrome://zoteroif/content/icons/L.png" tooltiptext="L"  onclick="methodsBody.filter('L')" class="filter-character"/>
				<image id="tagFilter-M" src="chrome://zoteroif/content/icons/M.png" tooltiptext="M"  onclick="methodsBody.filter('M')" class="filter-character"/>
				<image id="tagFilter-N" src="chrome://zoteroif/content/icons/N.png" tooltiptext="N"  onclick="methodsBody.filter('N')" class="filter-character"/>
				<image id="tagFilter-O" src="chrome://zoteroif/content/icons/O.png" tooltiptext="O"  onclick="methodsBody.filter('O')" class="filter-character"/>
				<image id="tagFilter-P" src="chrome://zoteroif/content/icons/P.png" tooltiptext="P"  onclick="methodsBody.filter('P')" class="filter-character"/>
			</hbox>
			<hbox align="center">
				<image id="tagFilter-Q" src="chrome://zoteroif/content/icons/Q.png" tooltiptext="Q"  onclick="methodsBody.filter('Q')" class="filter-character"/>
				<image id="tagFilter-R" src="chrome://zoteroif/content/icons/R.png" tooltiptext="R"  onclick="methodsBody.filter('R')" class="filter-character"/>
				<image id="tagFilter-S" src="chrome://zoteroif/content/icons/S.png" tooltiptext="S"  onclick="methodsBody.filter('S')" class="filter-character"/>
				<image id="tagFilter-T" src="chrome://zoteroif/content/icons/T.png" tooltiptext="T"  onclick="methodsBody.filter('T')" class="filter-character"/>
				<image id="tagFilter-U" src="chrome://zoteroif/content/icons/U.png" tooltiptext="U"  onclick="methodsBody.filter('U')" class="filter-character"/>
				<image id="tagFilter-V" src="chrome://zoteroif/content/icons/V.png" tooltiptext="V"  onclick="methodsBody.filter('V')" class="filter-character"/>
				<image id="tagFilter-W" src="chrome://zoteroif/content/icons/W.png" tooltiptext="W"  onclick="methodsBody.filter('W')" class="filter-character"/>
				<image id="tagFilter-X" src="chrome://zoteroif/content/icons/X.png" tooltiptext="X"  onclick="methodsBody.filter('X')" class="filter-character"/>
				<image id="tagFilter-Y" src="chrome://zoteroif/content/icons/Y.png" tooltiptext="Y"  onclick="methodsBody.filter('Y')" class="filter-character"/>
				<image id="tagFilter-Z" src="chrome://zoteroif/content/icons/Z.png" tooltiptext="Z"  onclick="methodsBody.filter('Z')" class="filter-character"/>
				<image id="tagFilter-OT" src="chrome://zoteroif/content/icons/OT.png" tooltiptext="#"  onclick="methodsBody.filter('OT')" class="filter-character"/>

				<html:input type="text" id="zoteroif.AnnotationTags.search" size="15" placeholder="" onkeydown="methodsBody.checkKeyEnter(event);"></html:input>
				<!-- <image id="search-icon" src="chrome://zoteroif/content/icons/search.png" tooltiptext="点击搜索" onclick="methodsBody.search();" style="width:32px;height:32px;"/> -->
				<div class="svg-container-search" 
					style="margin-left: 5px;"
					tooltiptext="点击搜索" 
					onclick="methodsBody.search();">
				</div>
			</hbox>
			<box flex="1">
				<richlistbox id="generalView-richlistbox-elem" style='height:470px;' flex="1"></richlistbox>
			</box>
			<hbox align="center" class="zoteroone-hbox-medium-gap" style="margin-top: 8px;">
				<hbox align="center" class="zoteroone-hbox-small-gap">
					<button label="跳转" oncommand="methodsBody.jumpWithDialogOpen();"/>
					<checkbox id="cardNotes-doubleClick-enable" label='双击跳转' checked="false" native="true" oncommand="methodsBody.run();"/>
					<checkbox id="imageCardNote-Search-First" label='优先跳转图片卡片' checked="false" native="true" oncommand="Zotero.Prefs.set('zoteroif.imageCardNoteSearchFirst', this.checked)"/>

					<!-- <image src="chrome://zoteroif/content/icons/help.png" 
						tooltiptext="若您对【非图片注释】和【图片注释】的标签打法有差异，建议开启【优先跳转图片卡片】。点击查看更多使用提示。" 
						style='width: 16px; height: 16px' 
						onclick='Zotero.getMainWindow().ZoteroPane.loadURI("https://www.yuque.com/qnscholar/zotero-one/htkif0mz2s1ca1kc?singleDoc# 《【聚合标签卡片】使用提示》");'
					/> -->

                    <div class="svg-container-help"
                        tooltiptext="若您对【非图片注释】和【图片注释】的标签打法有差异，建议开启【优先跳转图片卡片】。点击查看更多使用提示。" 
                        onclick='Zotero.getMainWindow().ZoteroPane.loadURI("https://www.yuque.com/qnscholar/zotero-one/htkif0mz2s1ca1kc?singleDoc# 《【聚合标签卡片】使用提示》");'>
                    </div>
				</hbox>

				<hbox align="center" class="zoteroone-hbox-medium-gap">
					<button label="批量重命名标签" oncommand="Zotero.ZoteroIF.renameTagsBatch();"/>
					<button label="批量删除标签" oncommand="Zotero.ZoteroIF.deleteTagsBatch();"/>
				</hbox>
			</hbox>
		</vbox>

		<vbox id="tagsNestedView" flex="1">
			<hbox align="center" class="zoteroone-hbox-large-gap" style="padding-top: 3px;padding-bottom: 3px;">
				<button id="annotationTagButton-NestedView" label="注释标签" oncommand="methodsBody.buildNestedView('annotationTag');"/>
				<!-- <image src="chrome://zoteroif/content/icons/update.png" tooltiptext="刷新注释标签" onclick="methodsBody.updateTags('annotationTag', 'nested');" style="width:32px;height:32px;"/> -->
				<div class="svg-container-update"
					tooltiptext="刷新注释标签" 
					onclick="methodsBody.updateTags('annotationTag', 'nested');">
				</div>
				<!-- <label value=" "/> -->

				<button id="imageAnnotationTagButton-NestedView" label="图片注释标签" oncommand="methodsBody.buildNestedView('imageAnnotationTag');"/>
				<!-- <image src="chrome://zoteroif/content/icons/update.png" tooltiptext="刷新图片注释标签" onclick="methodsBody.updateTags('imageAnnotationTag', 'nested');" style="width:32px;height:32px;"/> -->
				<div class="svg-container-update"
					tooltiptext="刷新图片注释标签" 
					onclick="methodsBody.updateTags('imageAnnotationTag', 'nested');">
				</div>
				<!-- <label value=" "/> -->

				<button id="itemTagButton-NestedView" label="条目标签" oncommand="methodsBody.buildNestedView('itemTag');"/>
				<!-- <image src="chrome://zoteroif/content/icons/update.png" tooltiptext="刷新条目标签" onclick="methodsBody.updateTags('itemTag', 'nested');" style="width:32px;height:32px;"/> -->
				<div class="svg-container-update"
					tooltiptext="刷新条目标签" 
					onclick="methodsBody.updateTags('itemTag', 'nested');">
				</div>

				<button id="gptNoteTagButton-NestedView" label="GPT 标签" oncommand="methodsBody.buildNestedView('gptNoteTag');"/>
				<!-- <image src="chrome://zoteroif/content/icons/update.png" tooltiptext="刷新 GPT 笔记标签" onclick="methodsBody.updateTags('gptNoteTag', 'nested');" style="width:32px;height:32px;"/> -->
				<div class="svg-container-update"
					tooltiptext="刷新 GPT 笔记标签" 
					onclick="methodsBody.updateTags('gptNoteTag', 'nested');">
				</div>
				<!-- <label value=" "/> -->
			</hbox>

			<hbox align="center" style="margin-top: 5px;margin-bottom: 8px;" class="zoteroone-hbox-medium-gap">
				<button id="collapseTopNestedTags" label="折叠顶层" oncommand="methodsBody.collapseTopNestedTags();"/>
				<button id="expandNestedTags" label="展开全部" oncommand="methodsBody.expandNestedTags();"/>
				<button id="collapseNestedTags" label="折叠全部" oncommand="methodsBody.collapseNestedTags();"/>
				<!-- <image src="chrome://zoteroif/content/icons/help.png" tooltiptext="📌 【双击】或者【Shift + 单击】：跳转 Obsidian；【右击】：查看完整嵌套标签" style='margin-left: 10px; width: 16px; height: 16px'/> -->

				<!-- <label value=" "/> -->

				<hbox align="center">
					<html:input type="text" id="zoteroif.nestedAnnotationTags.search" size="15" placeholder="" onkeydown="methodsBody.checkKeyEnter_nestedView(event);"></html:input>
					<!-- <image src="chrome://zoteroif/content/icons/search.png" tooltiptext="点击搜索" onclick="methodsBody.searchNestedTags();" style="width:32px;height:32px;"/> -->
					<div class="svg-container-search" 
						style="margin-left: 5px;"
						tooltiptext="点击搜索" 
						onclick="methodsBody.searchNestedTags();">
					</div>

					<div class="svg-container-arrowUp" 
						style="margin-left: 5px;transition: transform 0.125s ease;"
						tooltiptext="上一个" 
						onclick="methodsBody.searchNestedTags_previous();" 
						onmouseover='this.style.transform = "scale(1.2)";' 
						onmouseout='this.style.transform = "scale(1)";'>
					</div>

					<div class="svg-container-arrowDown" 
						style="margin-left: 6px;transition: transform 0.125s ease;"
						tooltiptext="下一个" 
						onclick="methodsBody.searchNestedTags_next();" 
						onmouseover='this.style.transform = "scale(1.2)";' 
						onmouseout='this.style.transform = "scale(1)";'>
					</div>

					<!-- <image src="chrome://zoteroif/content/icons/up.png" 
						style="width: 16px;height: 16px;margin-left: 5px;transition: transform 0.125s ease;" 
						tooltiptext="上一个" 
						onclick="methodsBody.searchNestedTags_previous();" 
						onmouseover='this.style.transform = "scale(1.2)";' 
						onmouseout='this.style.transform = "scale(1)";'/>
					<image src="chrome://zoteroif/content/icons/down.png" 
						style="width: 16px;height: 16px;margin-left: 6px;transition: transform 0.125s ease;" 
						tooltiptext="下一个" 
						onclick="methodsBody.searchNestedTags_next();" 
						onmouseover='this.style.transform = "scale(1.2)";' 
						onmouseout='this.style.transform = "scale(1)";'/> -->
				</hbox>
			</hbox>

			<box id="tags-nestedView" flex="1">
				<richlistbox id="tagTree"  style='font-size: 14px;height:520px;' flex="1"></richlistbox>
			</box>
	    </vbox>

    </vbox>

</dialog>

<keyset>
	<key id="key_close" key="W" modifiers="accel" oncommand="window.close();"/>
</keyset>
</window>
